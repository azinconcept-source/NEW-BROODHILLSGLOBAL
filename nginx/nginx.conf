# ============================================================
# BroodhillsGlobal — Nginx Production Configuration
# SSL/TLS + Security Headers + Caching + Performance
# ============================================================

# --- Rate Limiting Zones ---
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# --- Upstream (optional: if using Node/app behind Nginx) ---
# upstream app {
#   server 127.0.0.1:3000;
#   keepalive 32;
# }

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name broodhillsglobal.com www.broodhillsglobal.com;

    # ACME challenge for Certbot renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.broodhillsglobal.com$request_uri;
    }
}

# --- Non-www → www Redirect (HTTPS) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name broodhillsglobal.com;

    ssl_certificate     /etc/letsencrypt/live/broodhillsglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/broodhillsglobal.com/privkey.pem;

    return 301 https://www.broodhillsglobal.com$request_uri;
}

# --- Main HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.broodhillsglobal.com;

    root /var/www/broodhillsglobal/public;
    index index.html;

    # ── SSL/TLS ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/broodhillsglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/broodhillsglobal.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/broodhillsglobal.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_ecdh_curve X25519:prime256v1:secp384r1;

    # Session / Tickets
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Disable for perfect forward secrecy

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Content Security Policy — tighten based on your actual dependencies
    add_header Content-Security-Policy "
      default-src 'self';
      script-src  'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com;
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: https://www.google-analytics.com;
      connect-src 'self' https://www.google-analytics.com;
      frame-src   'none';
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    " always;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot font/otf font/ttf font/woff font/woff2
        image/bmp image/svg+xml image/vnd.microsoft.icon
        text/cache-manifest text/calendar text/css
        text/javascript text/markdown text/plain
        text/xml text/vcard text/vnd.rim.location.xloc
        text/vtt text/x-component text/x-cross-domain-policy;

    # Brotli (if nginx-module-brotli is installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Caching Rules ─────────────────────────────────────────
    # Hashed static assets — cache forever
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # Images
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # HTML — short cache, revalidate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # JSON / manifests
    location ~* \.(json|webmanifest)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Connection & Rate Limits ──────────────────────────────
    limit_req  zone=general burst=50 nodelay;
    limit_conn conn_limit 20;

    # ── Client / Proxy Settings ───────────────────────────────
    client_max_body_size 10m;
    keepalive_timeout 65;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;  # Hide Nginx version

    # ── SPA / Static Site Routing ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy (if applicable) ────────────────────────────
    # location /api/ {
    #     limit_req zone=api burst=20 nodelay;
    #     proxy_pass http://app;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # ── Block Common Attack Vectors ──────────────────────────
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ ~$  { deny all; access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /favicon.ico { access_log off; log_not_found off; }

    # ── Logging ───────────────────────────────────────────────
    error_log  /var/log/nginx/broodhillsglobal_error.log warn;
    access_log /var/log/nginx/broodhillsglobal_access.log combined buffer=16k flush=5s;
}
